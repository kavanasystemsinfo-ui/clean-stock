name: CI — CleanStock API

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - 'dashboard/**'
      - 'mobile/**'
      - '**.md'
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kavana
          POSTGRES_PASSWORD: kavana_test
          POSTGRES_DB: kavana_cleanstock_test
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://kavana:kavana_test@localhost:5432/kavana_cleanstock_test

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://kavana:kavana_test@localhost:5432/kavana_cleanstock_test

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://kavana:kavana_test@localhost:5432/kavana_cleanstock_test
          JWT_SECRET: ci-test-secret
          NODE_ENV: test
