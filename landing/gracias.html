<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gracias — CleanStock</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',-apple-system,sans-serif; background:#fafafa; display:flex; align-items:center; justify-content:center; min-height:100vh; color:#1a1a2e; }
.card { background:#fff; padding:60px 48px; border-radius:16px; box-shadow:0 10px 40px rgba(0,0,0,.1); text-align:center; max-width:480px; margin:24px; }
.icon { font-size:3rem; margin-bottom:16px; }
h1 { font-size:1.8rem; margin-bottom:12px; }
p { color:#6b7280; line-height:1.7; margin-bottom:24px; }
.btn { display:inline-flex; align-items:center; gap:8px; padding:12px 28px; border-radius:8px; font-weight:600; font-size:.9rem; text-decoration:none; background:#0055ff; color:#fff; border:none; transition:all .2s; }
.btn:hover { background:#003dcc; transform:translateY(-1px); }
</style>
</head>
<body>
<div class="card">
  <div class="icon">✅</div>
  <h1>¡Gracias por tu interés!</h1>
  <p>Te he recibido el mensaje. Te responderé en menos de 24 horas para activarte el mes de prueba gratuito sin compromiso.</p>
  <p style="font-size:.9rem;color:#9ca3af;">Mientras tanto, puedes ir mirando el panel de demostración.</p>
  <a href="/login" class="btn"><i class="fas fa-sign-in-alt"></i> Ver panel de demostración</a>
</div>
</body>
</html>
