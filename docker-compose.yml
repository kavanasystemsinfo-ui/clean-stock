name: kavana-cleanstock

# =============================================================================
# Kavana CleanStock — Full Stack Deployment
# Services: API + PostgreSQL + Dashboard
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: kavana-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kavana
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kavana_pass}
      POSTGRES_DB: kavana_cleanstock
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kavana -d kavana_cleanstock"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kavana-net

  # ---------------------------------------------------------------------------
  # API (Node.js + Express + Prisma)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: kavana-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database — uses Docker service name 'db' instead of localhost
      DATABASE_URL: "postgresql://kavana:***@db:5432/kavana_cleanstock"
      # JWT
      JWT_SECRET: ${JWT_SECRET:-kavana-cleanstock-jwt-secret-prod-2026}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      # Refresh Tokens
      REFRESH_TOKEN_EXPIRY_DAYS: ${REFRESH_TOKEN_EXPIRY_DAYS:-30}
      # Server
      PORT: 3000
      NODE_ENV: production
      CORS_ORIGIN: "https://cleanstock.kavanasystems.com,https://cleanstock.kavanasystems.com:4001,https://cleanstock.kavanasystems.com:4000,http://localhost:4001,http://localhost:4000"
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      # SMTP (for registration emails)
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:-noreply@cleanstock.com}
    ports:
      - "3000:3000"
    networks:
      - kavana-net
    # Health check via Express /api/v1/health endpoint
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 10s
      timeout: 5s
      start_period: 40s
      retries: 5

  # ---------------------------------------------------------------------------
  # Dashboard Supervisor (Vite + React + nginx)
  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: ./dashboard
      dockerfile: ../Dockerfile.dashboard
    container_name: kavana-dashboard
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "4001:80"
    networks:
      - kavana-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ---------------------------------------------------------------------------
  # Mobile PWA (Vite + React + nginx)
  # ---------------------------------------------------------------------------
  mobile:
    build:
      context: ./mobile
      dockerfile: ../Dockerfile.mobile
    container_name: kavana-mobile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "4000:80"
    networks:
      - kavana-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 3

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  pgdata:

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  kavana-net:
    driver: bridge